<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitWall v2 — Interview Co-Pilot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#1a1a24;
  --bg4:#22222e;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#f0eff8;
  --text2:#9896b0;
  --text3:#5a5870;
  --red:#e8442a;--red2:#ff6b50;
  --blue:#3a7fff;--blue2:#6fa3ff;
  --green:#2dc97e;--green2:#5de09e;
  --amber:#f0a830;--amber2:#ffc55a;
  --violet:#9b6dff;--violet2:#c4a8ff;
  --r:14px;--r2:8px;
}

body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

.shell{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 20px 80px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:26px 0 22px;border-bottom:1px solid var(--border);margin-bottom:32px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo-mark{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-.5px}
.logo-mark span{color:var(--red);font-style:italic}
.logo-sub{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.version-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);border:1px solid var(--border2);padding:3px 8px;border-radius:6px}

/* Role selector */
.role-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.role-pill{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:100px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;transition:all .15s;background:transparent}
.role-pill:hover{border-color:var(--blue);color:var(--blue2);background:rgba(58,127,255,.08)}
.role-pill.active{border-color:var(--violet);color:var(--violet2);background:rgba(155,109,255,.1)}

/* API Key */
.setup-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.setup-card.hidden{display:none}
.setup-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.api-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 13px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.api-input:focus{border-color:var(--blue)}
.api-input::placeholder{color:var(--text3)}
.btn-save{background:var(--blue);color:#fff;border:none;border-radius:var(--r2);padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-save:hover{background:var(--blue2)}
.connected-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:none}

/* Section label */
.sec-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}

/* ── STEP 1: Raw question input ── */
.step-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden;transition:border-color .3s}
.step-card.active{border-color:var(--border2)}
.step-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0}
.step-num.s1{background:rgba(155,109,255,.15);color:var(--violet2);border:1px solid rgba(155,109,255,.3)}
.step-num.s2{background:rgba(58,127,255,.15);color:var(--blue2);border:1px solid rgba(58,127,255,.3)}
.step-num.done-num{background:rgba(45,201,126,.2);color:var(--green2);border:1px solid var(--green)}
.step-title{font-size:13px;font-weight:700;letter-spacing:.5px}
.step-badge{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:100px}
.step-badge.waiting{color:var(--text3);border:1px solid var(--border)}
.step-badge.active{color:var(--amber2);border:1px solid rgba(240,168,48,.3);background:rgba(240,168,48,.07);animation:badge-pulse 2s infinite}
.step-badge.done{color:var(--green2);border:1px solid rgba(45,201,126,.3);background:rgba(45,201,126,.07)}
@keyframes badge-pulse{0%,100%{opacity:1}50%{opacity:.6}}

.step-body{padding:18px 20px}

.q-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px 16px;font-family:'Syne',sans-serif;font-size:14px;color:var(--text);line-height:1.65;resize:none;outline:none;transition:border-color .2s;min-height:90px}
.q-textarea:focus{border-color:var(--violet)}
.q-textarea::placeholder{color:var(--text3)}

.step-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.char-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}

/* Primary button */
.btn-primary{display:flex;align-items:center;gap:8px;background:var(--text);color:var(--bg);border:none;border-radius:100px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-primary:hover{background:#fff;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Voice row (reused for question) */
.voice-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.voice-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border2);border-radius:100px;padding:8px 16px;color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.voice-btn:hover{border-color:var(--red);color:var(--red2)}
.voice-btn.active{background:rgba(232,68,42,.1);border-color:var(--red);color:var(--red2)}
.mic-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.voice-btn.active .mic-dot{animation:mic-pulse 1s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}

/* ── SCRIPT OUTPUT CARD ── */
.script-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden;display:none}
.script-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.script-body{padding:24px 20px}
.script-box{background:var(--bg3);border:1px solid var(--violet);border-radius:var(--r2);padding:24px}
.script-intro{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:20px;font-style:italic}
.script-list{list-style:none;padding:0;margin:0 0 24px 0}
.script-list li{position:relative;padding-left:28px;margin-bottom:14px;font-size:14.5px;line-height:1.65;color:var(--text)}
.script-list li:before{content:'•';position:absolute;left:0;color:var(--violet2);font-size:22px;line-height:1}
.script-close{font-size:15px;line-height:1.6;color:var(--text);margin-top:20px;border-top:1px solid var(--border);padding-top:20px}

.script-actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn-action{background:transparent;border:1px solid var(--border2);border-radius:100px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-action:hover{border-color:var(--text2);color:var(--text)}
.btn-action.speak{background:rgba(45,201,126,.1);border-color:var(--green2);color:var(--green2)}

.loading-row{display:flex;align-items:center;gap:10px;padding:14px 0}
.loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);animation:dot-bounce .9s infinite both}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot-bounce{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.loading-text{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px}

/* Error */
.error-bar{display:none;background:rgba(232,68,42,.08);border:1px solid rgba(232,68,42,.25);border-radius:var(--r2);padding:12px 16px;font-size:13px;color:var(--red2);margin-bottom:14px}
.error-bar.visible{display:block}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">Pit<span>Wall</span></div>
      <div class="logo-sub">Interview Co-Pilot</div>
    </div>
    <div class="version-tag">v2.0 — Bullet Script Mode</div>
  </header>

  <!-- API Key -->
  <div class="setup-card" id="setupCard">
    <div class="setup-label">API Key</div>
    <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-…" autocomplete="off"/>
    <button class="btn-save" onclick="saveKey()">Connect</button>
    <div class="connected-dot" id="connDot"></div>
  </div>

  <!-- Role pills -->
  <div class="sec-label">Your target role</div>
  <div class="role-row">
    <button class="role-pill active" data-role="quant">Quant / Algo Trading</button>
    <button class="role-pill" data-role="data">Data Analyst / DS</button>
    <button class="role-pill" data-role="swe">Software Engineer</button>
    <button class="role-pill" data-role="fund">Fund Manager</button>
  </div>

  <!-- Step 1: Input -->
  <div class="step-card active" id="card1">
    <div class="step-header">
      <div class="step-num s1" id="sn1">01</div>
      <div class="step-title">Paste or speak your interview question</div>
      <div class="step-badge waiting" id="badge1">Ready</div>
    </div>
    <div class="step-body">
      <textarea class="q-textarea" id="rawQuestion"
        placeholder="Paste the question here (or use the mic below)…
e.g. Walk me through how you would build a momentum trading strategy"
        oninput="onQuestionInput()" rows="5"></textarea>

      <div class="voice-row">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
            <div class="mic-dot"></div>
            <span id="voiceBtnLabel">Speak the question</span>
          </button>
        </div>
      </div>

      <div class="step-footer">
        <div class="char-count" id="charCount">0 chars</div>
        <button class="btn-primary" id="generateBtn" onclick="runGenerateScript()" disabled>
          Generate Bullet Script →
        </button>
      </div>
    </div>
  </div>

  <!-- Script Output -->
  <div class="script-card" id="scriptCard">
    <div class="script-header">
      <div class="step-num s2" id="sn2">02</div>
      <div class="step-title">Your ready-to-say bullet script</div>
      <div class="step-badge done" id="badge2">Done ✓</div>
    </div>
    <div class="script-body" id="scriptBody">
      <!-- Filled by JS -->
    </div>
  </div>

  <div class="error-bar" id="errorBar"></div>

</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('pw2_key') || '';
let currentRole = 'quant';
let recognition = null;
let isRecording = false;
let roleLabels = {
  quant: 'Quantitative Trading / Algorithmic Finance',
  data:  'Data Analyst / Data Science',
  swe:   'Software Engineering',
  fund:  'Fund Manager / Investment Management'
};

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  if (apiKey) showConnected();
  
  document.querySelectorAll('.role-pill').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.role-pill').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentRole = b.dataset.role;
    });
  });

  // Speech recognition for QUESTION input
  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalText = '';

    recognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('rawQuestion').value = (finalText + interim).trim();
      onQuestionInput();
    };
    recognition.onerror = () => stopVoice();
    recognition.onend = () => { if (isRecording) recognition.start(); };
  } else {
    document.getElementById('voiceBtn').style.display = 'none';
  }
});

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k.startsWith('sk-ant')) { alert('Please enter a valid Anthropic API key (starts with sk-ant).'); return; }
  apiKey = k;
  localStorage.setItem('pw2_key', k);
  showConnected();
}
function showConnected() {
  document.getElementById('apiKeyInput').value = '•'.repeat(24);
  document.getElementById('connDot').style.display = 'block';
  document.querySelector('.btn-save').textContent = 'Change';
}

// ── Input handling ──
function onQuestionInput() {
  const v = document.getElementById('rawQuestion').value.trim();
  document.getElementById('charCount').textContent = v.length + ' chars';
  document.getElementById('generateBtn').disabled = v.length < 15;
}

// ── Voice for question ──
function toggleVoice() {
  if (!recognition) return;
  isRecording = !isRecording;
  const btn = document.getElementById('voiceBtn');
  const label = document.getElementById('voiceBtnLabel');
  
  if (isRecording) {
    recognition.start();
    btn.classList.add('active');
    label.textContent = 'Listening… (click to stop)';
  } else {
    recognition.stop();
    btn.classList.remove('active');
    label.textContent = 'Speak the question';
  }
}
function stopVoice() {
  isRecording = false;
  const btn = document.getElementById('voiceBtn');
  btn.classList.remove('active');
  document.getElementById('voiceBtnLabel').textContent = 'Speak the question';
}

// ── API call ──
async function callClaude(system, user) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-3-5-sonnet-20241022',   // updated to real current model for reliability
      max_tokens: 1200,
      system,
      messages: [{ role: 'user', content: user }]
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error?.message || 'API error');
  }
  const d = await r.json();
  return d.content[0].text;
}

// ── MAIN GENERATE FUNCTION ──
async function runGenerateScript() {
  if (!apiKey) { showError('Please add your Anthropic API key above.'); return; }
  const raw = document.getElementById('rawQuestion').value.trim();
  if (!raw) return;

  hideError();
  document.getElementById('generateBtn').disabled = true;
  setBadge('badge1', 'active', 'Generating…');

  // Show output card with loading
  const scriptCard = document.getElementById('scriptCard');
  scriptCard.style.display = 'block';
  document.getElementById('scriptBody').innerHTML = `
    <div class="loading-row">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">Generating your bullet script…</div>
    </div>`;
  scriptCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const roleLabel = roleLabels[currentRole];

  const system = `You are an elite ${roleLabel} interview coach. 
The candidate gives you a raw interview question. 
Return ONLY a clean JSON object with exactly this structure (no markdown, no extra text):

{
  "intro": "The exact first sentence they should say (natural & confident)",
  "bullets": [
    "Full spoken sentence for bullet 1",
    "Full spoken sentence for bullet 2",
    ...
  ],
  "close": "Strong closing sentence"
}

Rules:
- 5-8 bullets maximum
- Each bullet is a complete, natural sentence ready to speak out loud
- Sound professional but conversational (no jargon unless role-appropriate)
- For Quant/Algo: include frameworks, math, or code steps
- For DS/SWE: mention metrics, tools, trade-offs
- For Fund Manager: mention P&L impact, risk, portfolio context
- Make it concise and high-signal — exactly what they should say in a real interview.`;

  try {
    const responseText = await callClaude(system, `Role: ${roleLabel}\n\nQuestion: ${raw}`);
    let parsed;
    try { parsed = JSON.parse(responseText); }
    catch {
      // fallback if JSON fails
      parsed = {
        intro: "Here's how I'd approach this question.",
        bullets: ["Bullet 1 placeholder.", "Bullet 2 placeholder."],
        close: "That's my complete answer."
      };
    }

    renderScript(parsed);
    setBadge('badge1', 'done', 'Done');
    setBadge('badge2', 'done', 'Done');

  } catch(e) {
    showError('Error generating script: ' + e.message);
    document.getElementById('generateBtn').disabled = false;
    setBadge('badge1', 'waiting', 'Ready');
    scriptCard.style.display = 'none';
  }
}

function renderScript(data) {
  let html = `
    <div class="script-box">
      <div class="script-intro">${data.intro}</div>
      <ul class="script-list">`;

  data.bullets.forEach(b => {
    html += `<li>${b}</li>`;
  });

  html += `</ul>
      <div class="script-close">${data.close}</div>
    </div>

    <div class="script-actions">
      <button class="btn-action" onclick="copyScript()">📋 Copy all bullets</button>
      <button class="btn-action speak" onclick="speakScript()">🔊 Speak the whole script</button>
      <button class="btn-action" onclick="nextQuestion()">↺ New question</button>
    </div>`;

  document.getElementById('scriptBody').innerHTML = html;
}

// ── Utility functions ──
function copyScript() {
  const text = document.querySelector('.script-box').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const orig = event.target.textContent;
    event.target.textContent = '✅ Copied!';
    setTimeout(() => event.target.textContent = orig, 2000);
  });
}

function speakScript() {
  const box = document.querySelector('.script-box');
  if (!box) return;
  const fullText = box.innerText;
  const utterance = new SpeechSynthesisUtterance(fullText);
  utterance.rate = 1.05;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function showError(msg) {
  const el = document.getElementById('errorBar');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() {
  document.getElementById('errorBar').classList.remove('visible');
}

function setBadge(id, state, label) {
  const el = document.getElementById(id);
  el.className = `step-badge ${state}`;
  el.textContent = label;
}

// ── Reset ──
function nextQuestion() {
  document.getElementById('rawQuestion').value = '';
  document.getElementById('charCount').textContent = '0 chars';
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('scriptCard').style.display = 'none';
  setBadge('badge1', 'waiting', 'Ready');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
